name: assign_lineages
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - biopython==1.78
  - minimap2>=2.16
  - pip>=19.3.1
  - python>=3.11
  - snakemake-minimal>8
  - gofasta
  - usher
  - pandas
  - pysam
  - nextclade
  - git-lfs
  - ucsc-fatovcf
  - scikit-learn>=0.23.1,<1.3.0
  - pip:
    - git+https://github.com/cov-lineages/scorpio.git
    - git+https://github.com/cov-lineages/constellations.git
    - git+https://github.com/cov-lineages/pangolin.git
    - git+https://github.com/cov-lineages/pangolin-data.git
